name: Publish package indexes to R2
run-name: Publish package indexes to R2

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

env:
  UV_DEFAULT_INDEX: https://pypi.org/simple

concurrency:
  group: index-publication
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    continue-on-error: ${{ github.event_name == 'schedule' }}
    environment: publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"

      - name: Sync environment
        run: uv sync --locked --dev

      - name: Validate configuration
        run: uv run --locked build-index validate-config

      - name: Resolve private producer scope
        id: producer-scope
        run: |
          uv run --locked build-index reader-token-scope \
            --github-output "$GITHUB_OUTPUT"

      - name: Create producer repository token
        if: steps.producer-scope.outputs.has_private_repositories == 'true'
        id: producer-token
        uses: ./actions/create-reader-token
        with:
          client-id: ${{ vars.BUILD_INDEX_READER_CLIENT_ID }}
          private-key: ${{ secrets.BUILD_INDEX_READER_PRIVATE_KEY }}
          owner: ${{ steps.producer-scope.outputs.owner }}
          repositories: ${{ steps.producer-scope.outputs.repositories }}

      - name: Collect producer releases
        env:
          GH_TOKEN: ${{ steps.producer-token.outputs.token || github.token }}
        run: uv run --locked build-index collect

      - name: Mirror artifacts and core metadata to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.R2_ACCESS_KEY_ID }}
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_REGION: auto
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          GH_TOKEN: ${{ steps.producer-token.outputs.token || github.token }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
        run: uv run --locked build-index mirror

      - name: Build index tree
        env:
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
        run: uv run --locked build-index build

      - name: Sync index documents to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.R2_ACCESS_KEY_ID }}
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_REGION: auto
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
        run: uv run --locked build-index sync-r2 --input dist
