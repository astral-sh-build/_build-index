# Keep the two vLLM sources together. Astral builds remain authoritative for
# CPU wheels; upstream CPU wheels are ignored below to avoid duplicate sources.
[[repository]]
repository = "astral-sh-build/build-vllm"
pretty_name = "vLLM"
projects = ["vllm"]
access = "public"

# Upstream releases are imported from the first version with GitHub-provided
# asset digests. Do not import a version until the Astral source above can
# publish alongside it. Explicit wheel labels win; bare wheels use only the
# reviewed, bounded CUDA mappings below.
[[repository]]
repository = "vllm-project/vllm"
projects = ["vllm"]
access = "public"
tag_regex = "^v(?P<version>.+)$"
minimum_release_version = "0.9.1"
maximum_release_version = "0.25.0"
ignored_channels = ["cpu"]

unlabeled_channel_rules = [
  { from = "0.9.1", before = "0.12.0", channel = "cu128" },
  { from = "0.12.0", before = "0.20.0", channel = "cu129" },
  { from = "0.20.0", before = "0.26.0", channel = "cu130" },
]
