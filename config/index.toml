pretty_name = "DeepGEMM"
projects = ["deep-gemm"]
access = "public"

[[repository]]
repository = "astral-sh-build/build-deepspeed"
pretty_name = "DeepSpeed"
projects = ["deepspeed"]
access = "public"
tag_regex = '^v(?P<version>.+?)(?:-r[0-9]+)?$'
# These tags encode a commit hash in wheel metadata while their filenames
# encode CUDA/Torch compatibility. Preserve and publish the original bytes,
# accepting that pip rejects the inconsistent local versions.
allowed_metadata_version_mismatch_tags = [
  "v0.18.1",
  "v0.18.2",
  "v0.18.3",
  "v0.18.4-r1",
]

