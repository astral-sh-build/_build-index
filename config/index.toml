schema_version = 1

# Initial channels reflect observed first-party build needs. A channel being
# present does not imply that any package is currently published in it.
[[channel]]
name = "cpu"
description = "CPU builds"

[[channel]]
name = "cu118"
description = "CUDA 11.8 builds"

[[channel]]
name = "cu121"
description = "CUDA 12.1 builds"

[[channel]]
name = "cu124"
description = "CUDA 12.4 builds"

[[channel]]
name = "cu126"
description = "CUDA 12.6 builds"

[[channel]]
name = "cu128"
description = "CUDA 12.8 builds"

[[channel]]
name = "cu129"
description = "CUDA 12.9 builds"

[[channel]]
name = "cu130"
description = "CUDA 13.0 builds"

[[channel]]
name = "cu132"
description = "CUDA 13.2 builds"

# Repository entries admit a producer and its projects. Channels are inferred
# from each wheel and checked against the global channel list above.
[[repository]]
repository = "astral-sh-build/build-adan"
pretty_name = "Adan"
projects = ["adan"]
access = "public"

[[repository]]
repository = "astral-sh-build/build-causal-conv1d"
pretty_name = "causal-conv1d"
projects = ["causal-conv1d"]
access = "public"
tag_regex = '^v(?P<version>.+?)(?:-r[0-9]+)?$'

[[repository]]
repository = "astral-sh-build/build-deepep"
pretty_name = "DeepEP"
projects = ["deep-ep"]
access = "public"

[[repository]]
