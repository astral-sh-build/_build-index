name: Create build-index reader token
description: Create a read-only GitHub App token for approved producer repositories.

inputs:
  client-id:
    description: Client ID of the build-index reader GitHub App.
    required: true
  private-key:
    description: Private key of the build-index reader GitHub App.
    required: true
  owner:
    description: Owner of the producer repositories.
    required: true
  repositories:
    description: Comma or newline-separated producer repository names.
    required: true

outputs:
  token:
    description: Short-lived GitHub App installation access token.
    value: ${{ steps.token.outputs.token }}
  installation-id:
    description: GitHub App installation ID.
    value: ${{ steps.token.outputs.installation-id }}
  app-slug:
    description: GitHub App slug.
    value: ${{ steps.token.outputs.app-slug }}

runs:
  using: composite
  steps:
    - name: Create read-only producer repository token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
        permission-contents: read
